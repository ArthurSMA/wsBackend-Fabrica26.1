<!DOCTYPE html>
{% load static %}
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'auth.css' %}">
    <title>F1 - Cadastro</title>
</head>

<body>
    <div class="auth-page-wrapper">

        <div class="main-container auth-center">
            <header class="f1-header">
                <div class="f1-logo">F1</div>
                <h1>World Championship</h1>
            </header>

            <div class="auth-card">
                <div class="card-header-line"></div>

                <div class="auth-content">
                    <h2>CRIAR CONTA</h2>

                    {% if errors %}
                    <div class="error-container">
                        <ul>
                            {% for field, error_list in errors.items %}
                            {% for error in error_list %}<li>{{ error }}</li>{% endfor %}
                            {% endfor %}
                        </ul>
                    </div>
                    {% endif %}

                    <form method="POST" action="{% url 'api-cadastro' %}" class="f1-form">
                        {% csrf_token %}

                        <div class="input-group">
                            <label for="nome">Nome</label>
                            <input type="text" id="nome" name="nome" value="{{ dados_preenchidos.nome|default:'' }}"
                                required placeholder="Seu nome">
                        </div>

                        <div class="input-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" name="email" value="{{ dados_preenchidos.email|default:'' }}"
                                required placeholder="seu@email.com">
                        </div>

                        <div class="input-group">
                            <label for="senha">Senha</label>
                            <input type="password" id="senha" name="senha" required placeholder="Sua senha">
                        </div>

                        <button type="submit" class="btn-primary">CADASTRAR</button>
                    </form>

                    <div class="auth-footer">
                        <span>Já tem uma conta?</span>
                        <a href="{% url 'login' %}" class="btn-secondary">FAZER LOGIN</a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>

</html>
